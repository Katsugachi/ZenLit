<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenLit</title>
<!-- This script enables the security settings required for Stockfish 18 -->
<script src="coi-serviceworker.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;transition:background .3s}
.app{display:flex;gap:24px;align-items:flex-start}
.side{display:flex;flex-direction:column;gap:10px;width:175px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;transition:background .3s,border-color .3s}
.lbl{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.cap-row{display:flex;flex-wrap:wrap;gap:1px;min-height:24px;align-items:center}
.cap-row canvas{width:22px;height:22px}
h1{font-size:22px;color:var(--accent);letter-spacing:2px;font-weight:500}
.sub{font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:2px}
.status{font-size:12px;color:var(--text);text-align:center;min-height:30px;display:flex;align-items:center;justify-content:center}
.trow{display:flex;align-items:center;gap:8px;margin-top:6px;justify-content:center}
.tdot{width:9px;height:9px;border-radius:50%;transition:background .2s,border .2s}
.tlbl{font-size:10px;color:var(--muted);letter-spacing:1px}
.btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;padding:9px;border-radius:8px;cursor:pointer;text-transform:uppercase;transition:all .2s;width:100%}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.p{border-color:var(--accent);color:var(--accent)}.btn.p:hover{background:var(--accent);color:#000}
.mvs{max-height:200px;overflow-y:auto;font-size:11px;color:var(--muted)}.mvs::-webkit-scrollbar{width:2px}.mvs::-webkit-scrollbar-thumb{background:var(--border)}
.mpair{display:flex;gap:6px;padding:1px 0}.mnum{color:var(--border);width:20px}.msan{color:var(--text)}
.thinking{font-size:10px;color:var(--muted);letter-spacing:2px;text-align:center;display:none}.thinking.on{display:block;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.bwrap{position:relative}
#cv{border-radius:3px;display:block;cursor:pointer;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 2px var(--border)}
.cf{display:flex;margin-top:4px}.cf span,.cr span{font-size:9px;color:var(--muted)}
.cf span{flex:0 0 64px;text-align:center}
.cr{position:absolute;right:-18px;top:0;display:flex;flex-direction:column}.cr span{height:64px;display:flex;align-items:center}
.po{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:100}.po.on{display:flex}
.pb{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center}
.pc{display:flex;gap:10px;margin-top:12px}
.pc canvas{width:60px;height:60px;cursor:pointer;border-radius:8px;border:2px solid transparent;padding:4px;box-sizing:content-box;transition:border .15s}
.pc canvas:hover{border-color:var(--accent)}
.themes{display:flex;gap:6px;flex-wrap:wrap}
.thbtn{width:28px;height:28px;border-radius:6px;border:2px solid transparent;cursor:pointer;overflow:hidden;display:flex;transition:border .15s;flex-shrink:0}
.thbtn.active{border-color:var(--accent)}
.thbtn div{flex:1}

/* Themes */
.t-dark{--bg:#0e0e0e;--surface:#161616;--border:#2a2a2a;--accent:#c8a96e;--text:#e8e4dc;--muted:#555;--lsq:#f0d9b5;--dsq:#b58863;--sel:#7bbd6a;--lf-l:#cdd26a;--lf-d:#aaa23a;}
.t-green{--bg:#1a2617;--surface:#1f2e1c;--border:#2d4228;--accent:#6abf69;--text:#d4e8d0;--muted:#4a6b47;--lsq:#eeeed2;--dsq:#769656;--sel:#baca2b;--lf-l:#f6f669;--lf-d:#baca2b;}
.t-blue{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#58a6ff;--text:#c9d1d9;--muted:#484f58;--lsq:#dee3e6;--dsq:#8ca2ad;--sel:#90bfd8;--lf-l:#aac9dd;--lf-d:#7fafc4;}
.t-walnut{--bg:#1c1410;--surface:#241a14;--border:#3d2b1f;--accent:#d4956a;--text:#e8d5c4;--muted:#5c3d2a;--lsq:#f0cfa0;--dsq:#8b5e3c;--sel:#a8d070;--lf-l:#d4c47a;--lf-d:#a89050;}
.t-paper{--bg:#f5f0e8;--surface:#fff;--border:#ddd;--accent:#8b6f47;--text:#333;--muted:#999;--lsq:#f0d9b5;--dsq:#b58863;--sel:#7bbd6a;--lf-l:#cdd26a;--lf-d:#aaa23a;}
</style>
</head>
<body class="t-dark">
<div class="app">
  <div class="side">
    <div style="text-align:center"><h1>ZenLit</h1><div class="sub">Simple JS Engine</div></div>
    <div class="card"><div class="lbl">Black captured</div><div class="cap-row" id="cb"></div></div>
    <div class="card" style="text-align:center">
      <div class="status" id="st">Your turn</div>
      <div class="trow"><div class="tdot" id="td"></div><div class="tlbl" id="tl">WHITE</div></div>
    </div>
    <div class="thinking" id="th">thinking...</div>
    <div class="card"><div class="lbl">White captured</div><div class="cap-row" id="cw"></div></div>
  </div>

  <div class="bwrap">
    <canvas id="cv" width="512" height="512"></canvas>
    <div class="cr" id="cr"></div>
    <div class="cf" id="cf"></div>
  </div>

  <div class="side">
    <div class="card"><div class="lbl">Moves</div><div class="mvs" id="mvs"></div></div>
    <div class="card">
      <div class="lbl">Theme</div>
      <div class="themes" id="themes"></div>
    </div>
    <button class="btn p" onclick="newGame()">New Game</button>
    <button class="btn" onclick="undoMove()">Undo</button>
  </div>
</div>

<div class="po" id="po"><div class="pb"><div class="lbl" style="text-align:center;margin-bottom:4px">Promote pawn</div><div class="pc" id="pc"></div></div></div>
<div class="po" id="colorpo"><div class="pb"><div class="lbl" style="text-align:center;margin-bottom:12px">Play as</div><div style="display:flex;gap:14px;justify-content:center"><div id="pickW" style="cursor:pointer;text-align:center"><canvas width="80" height="80" id="pickWc"></canvas><div style="font-size:10px;letter-spacing:2px;margin-top:6px;color:var(--muted)">WHITE</div></div><div id="pickB" style="cursor:pointer;text-align:center"><canvas width="80" height="80" id="pickBc"></canvas><div style="font-size:10px;letter-spacing:2px;margin-top:6px;color:var(--muted)">BLACK</div></div></div></div></div>
<div class="po" id="gameoverpo"><div class="pb" style="min-width:220px;text-align:center"><div class="lbl" style="margin-bottom:10px">Game Over</div><div id="goMsg" style="font-size:22px;color:var(--accent);letter-spacing:2px;margin-bottom:6px"></div><div id="goSub" style="font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:18px"></div><button class="btn p" style="width:100%" onclick="document.getElementById('gameoverpo').classList.remove('on');newGame()">Play Again</button></div></div>
